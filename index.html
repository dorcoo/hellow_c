<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소싱 협업 대시보드 (실시간)</title>
    
    <script>
        window.process = { env: { NODE_ENV: 'production' } };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .loading-container {
            position: fixed; inset: 0; background: white; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .toast-slide-in {
            animation: slideIn 0.3s ease-out forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out; }
    </style>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getApps, getApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch };
        window.isFirebaseReady = true;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans font-medium">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const DEFAULT_MASTER_PW = "3522";
        const DEFAULT_MEMBER_PW = "5678";

        const IconBase = ({ children, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
        );

        const Icons = {
            Package: (props) => <IconBase {...props}><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22v-10"/></IconBase>,
            Search: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconBase>,
            Check: (props) => <IconBase {...props}><path d="M20 6 9 17l-5-5"/></IconBase>,
            X: (props) => <IconBase {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></IconBase>,
            Minus: (props) => <IconBase {...props}><path d="M5 12h14"/></IconBase>,
            Calculator: (props) => <IconBase {...props}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><path d="M16 14v4M12 14v4M8 14v4M12 10h.01M8 10h.01M16 10h.01"/></IconBase>,
            ImageIcon: (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></IconBase>,
            Trash2: (props) => <IconBase {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></IconBase>,
            Plus: (props) => <IconBase {...props}><path d="M5 12h14"/><path d="M12 5v14"/></IconBase>,
            Settings: (props) => <IconBase {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33-1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>,
            Edit2: (props) => <IconBase {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></IconBase>,
            StickyNote: (props) => <IconBase {...props}><path d="M15.5 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/></IconBase>,
            ChevronRight: (props) => <IconBase {...props}><path d="m9 18 6-6-6-6"/></IconBase>,
            LayoutDashboard: (props) => <IconBase {...props}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconBase>,
            CheckCircle: (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>,
            ZoomIn: (props) => <IconBase {...props}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></IconBase>,
            Cloud: (props) => <IconBase {...props}><path d="M17.5 19c0-1.7-1.3-3-3-3h-1.6c-.3-2.3-2.2-4-4.4-4-2.5 0-4.5 2-4.5 4.5v.5"/><path d="M17.5 19H9c-2.2 0-4-1.8-4-4"/><path d="M20.4 14.5c.8.5 1.6 1.5 1.6 2.5 0 1.7-1.3 3-3 3h-2.1"/></IconBase>,
            RefreshCw: (props) => <IconBase {...props}><path d="M3 12a9 9 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></IconBase>,
            Truck: (props) => <IconBase {...props}><rect width="16" height="13" x="2" y="6" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></IconBase>,
            Menu: (props) => <IconBase {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></IconBase>,
            Download: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></IconBase>,
            Upload: (props) => <IconBase {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconBase>,
            Clock: (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconBase>,
            Flag: (props) => <IconBase {...props}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></IconBase>,
            ChevronUp: (props) => <IconBase {...props}><polyline points="18 15 12 9 6 15"/></IconBase>,
            ChevronDown: (props) => <IconBase {...props}><polyline points="6 9 12 15 18 9"/></IconBase>,
            ChevronsUp: (props) => <IconBase {...props}><path d="m17 11-5-5-5 5"/><path d="m17 18-5-5-5 5"/></IconBase>,
            ChevronsDown: (props) => <IconBase {...props}><path d="m7 6 5 5 5-5"/><path d="m7 13 5 5 5-5"/></IconBase>,
            Lock: (props) => <IconBase {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></IconBase>,
            Shield: (props) => <IconBase {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></IconBase>,
            User: (props) => <IconBase {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>,
            Key: (props) => <IconBase {...props}><path d="m21 2-2 2m-7.6 7.6a6 6 0 1 1-8.4-8.4 6 6 0 0 1 8.4 8.4Zm5.2.5 2-2a2 2 0 0 0 2.8 2.8l-5-5"/><path d="m15 15 3 3"/></IconBase>,
            FileText: (props) => <IconBase {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></IconBase>,
            RotateCcw: (props) => <IconBase {...props}><path d="M3 12a9 9 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 12"/><path d="M3 3v9h9"/></IconBase>,
            Layers: (props) => <IconBase {...props}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></IconBase>,
            FolderTree: (props) => <IconBase {...props}><path d="M20 10h-7V3"/><path d="M13 21v-7"/><path d="M4 21v-7h5"/><path d="M9 10H4V3h5"/></IconBase>,
            Eye: (props) => <IconBase {...props}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></IconBase>,
            Calendar: (props) => <IconBase {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></IconBase>,
            ChevronsUpDown: (props) => <IconBase {...props}><path d="m7 15 5 5 5-5"/><path d="m7 9 5-5 5 5"/></IconBase>,
            ArrowUpDown: (props) => <IconBase {...props}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></IconBase>
        };

        const { 
            Package, Search, Check, X, Minus, Calculator, ImageIcon, Trash2, Plus, Settings, Edit2, 
            StickyNote, ChevronRight, LayoutDashboard, CheckCircle, ZoomIn, Cloud, RefreshCw, Truck, Menu, Download, Upload, Clock, Flag, ChevronUp, ChevronDown, ChevronsUp, ChevronsDown, Lock, Shield, User, Key, FileText, RotateCcw, Layers, FolderTree, Eye, Calendar, ChevronsUpDown, ArrowUpDown
        } = Icons;

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }
            static getDerivedStateFromError(error) { return { hasError: true }; }
            render() {
                if (this.state.hasError) return <div className="p-10 text-center">오류가 발생했습니다. 새로고침 해주세요.</div>;
                return this.props.children;
            }
        }

        const StatusButton = ({ status, onClick }) => {
            let bgClass = "bg-gray-100 text-gray-300";
            if (status === 'approved') bgClass = "bg-green-100 text-green-600 border-green-200";
            if (status === 'rejected') bgClass = "bg-red-100 text-red-600 border-red-200";
            return (
                <button onClick={onClick} className={`w-8 h-8 rounded-full flex items-center justify-center border transition-all hover:scale-110 ${bgClass}`}>
                    {status === 'approved' ? <Check className="w-4 h-4" /> : status === 'rejected' ? <X className="w-4 h-4" /> : <Minus className="w-4 h-4" />}
                </button>
            );
        };

        const CurrencyCalculatorSidebar = ({ exchangeRate, onRateChange, userRole }) => {
            const [cny, setCny] = useState('');
            const krw = cny ? Math.round(cny * exchangeRate) : 0;
            return (
                <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 mb-4 font-bold">
                    <div className="flex items-center gap-2 mb-2 text-indigo-800 text-xs font-black uppercase"><Calculator className="w-3 h-3" /> <span>환율 계산기</span></div>
                    <div className="space-y-2">
                        <div className="flex items-center justify-between text-[10px] text-indigo-600 font-black">
                            <span>적용 환율:</span>
                            {userRole === 'admin' ? 
                                <input type="number" value={exchangeRate} onChange={(e) => onRateChange(Number(e.target.value))} className="w-16 text-right rounded border px-1" /> : 
                                <span className="font-mono">{exchangeRate}</span>
                            }
                        </div>
                        <input type="number" placeholder="위안(CNY)" value={cny} onChange={(e) => setCny(e.target.value)} className="w-full text-sm p-2 rounded border border-indigo-200 outline-none font-black" />
                        <div className="w-full text-sm p-2 rounded bg-white border border-indigo-200 text-right font-mono font-black">{krw.toLocaleString()} KRW</div>
                    </div>
                </div>
            )
        }

        const LoginScreen = ({ onLogin, firebaseSDK }) => {
            const [inputPw, setInputPw] = useState("");
            const [error, setError] = useState(false);
            const [loading, setLoading] = useState(true);
            const [serverPasswords, setServerPasswords] = useState({ master: DEFAULT_MASTER_PW, memberPasswords: {} });

            useEffect(() => {
                const initAndFetch = async () => {
                    try {
                        const { initializeApp, getApps, getAuth, signInAnonymously, getFirestore, doc, getDoc } = firebaseSDK;
                        const firebaseConfig = {
                            apiKey: "AIzaSyBCitvHwUFoRoRqTm-7lL-914T8tmHZYHE",
                            authDomain: "from-to-c.firebaseapp.com",
                            projectId: "from-to-c",
                            storageBucket: "from-to-c.firebasestorage.app",
                            messagingSenderId: "544793341133",
                            appId: "1:544793341133:web:cafc1766980b6322cd4d84"
                        };
                        const app = !getApps().length ? initializeApp(firebaseConfig) : getApps()[0];
                        const auth = getAuth(app);
                        const db = getFirestore(app);
                        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sourcing-app-v2';

                        await signInAnonymously(auth);
                        const securityRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'security');
                        const snap = await getDoc(securityRef);
                        if (snap.exists()) {
                            const data = snap.data();
                            setServerPasswords({ master: data.master || DEFAULT_MASTER_PW, memberPasswords: data.memberPasswords || {} });
                        }
                    } catch (e) { console.error(e); } finally { setLoading(false); }
                };
                initAndFetch();
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (inputPw === serverPasswords.master) onLogin('admin', 'master');
                else {
                    const memberKey = Object.keys(serverPasswords.memberPasswords).find(key => serverPasswords.memberPasswords[key] === inputPw);
                    if (memberKey) onLogin('member', memberKey);
                    else if (inputPw === "5678") onLogin('member', 'guest');
                    else { setError(true); setInputPw(""); }
                }
            };

            if (loading) return <div className="fixed inset-0 flex items-center justify-center bg-white"><div className="spinner"></div></div>;

            return (
                <div className="fixed inset-0 bg-slate-100 flex items-center justify-center z-[9999] p-4 font-bold">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-xl p-8 border border-slate-200">
                        <div className="flex flex-col items-center mb-8 text-center font-black">
                            <div className="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-4"><Lock className="w-7 h-7" /></div>
                            <h2 className="text-xl font-black">팀 접속 권한 확인</h2>
                            <p className="text-sm text-slate-500 mt-2">비밀번호를 입력하세요.</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="password" value={inputPw} onChange={(e) => { setInputPw(e.target.value); setError(false); }} className={`w-full p-4 text-center text-lg tracking-widest font-black border-2 rounded-xl focus:outline-none transition-all ${error ? 'border-red-300 bg-red-50' : 'border-slate-200 focus:border-indigo-500 bg-slate-50'}`} placeholder="●●●●" autoFocus />
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black py-4 rounded-xl shadow-lg transition-transform active:scale-95">입장하기</button>
                        </form>
                    </div>
                </div>
            );
        };

        const SystemSettingsModal = ({ currentProjects, currentTeam, currentSecurity, onClose, onSave }) => {
            const [projs, setProjs] = useState([...currentProjects]);
            const [team, setTeam] = useState([...currentTeam]);
            const [masterPw, setMasterPw] = useState(currentSecurity?.master || DEFAULT_MASTER_PW);
            const [memberPwMap, setMemberPwMap] = useState(currentSecurity?.memberPasswords || {});

            const handleSave = () => onSave(projs, team, { master: masterPw, memberPasswords: memberPwMap });

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4 font-bold">
                    <div className="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-xl flex flex-col h-[600px]">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-black uppercase text-indigo-900 flex items-center gap-2"><Settings className="w-6 h-6"/>시스템 설정</h3>
                            <button onClick={onClose}><X className="w-6 h-6"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-8">
                            <section className="bg-red-50 p-4 rounded-xl border border-red-100 font-black">
                                <label className="text-xs font-black text-red-600 uppercase mb-2 block">관리자 암호</label>
                                <input type="text" value={masterPw} onChange={(e) => setMasterPw(e.target.value)} className="w-full border border-red-200 rounded-lg p-2 text-sm font-black"/>
                            </section>
                            <section className="font-black">
                                <label className="text-xs font-black text-gray-400 uppercase mb-4 block border-b pb-1">팀원 관리 (팀별 개별암호)</label>
                                <div className="space-y-2">
                                    {team.map((m, i) => (
                                        <div key={i} className="flex gap-2 items-center">
                                            <input value={m.label} onChange={(e) => { const n = [...team]; n[i].label = e.target.value; setTeam(n); }} className="flex-1 border rounded-lg p-2 text-sm font-black" placeholder="이름" />
                                            <input value={memberPwMap[m.key] || ''} onChange={(e) => setMemberPwMap({...memberPwMap, [m.key]: e.target.value})} className="w-24 border rounded-lg p-2 text-sm font-mono font-black" placeholder="암호" />
                                            <label className="flex items-center gap-1 text-xs text-gray-500 cursor-pointer whitespace-nowrap ml-1">
                                                <input type="checkbox" checked={m.isConfirmedOnly || false} onChange={(e) => { const n = [...team]; n[i].isConfirmedOnly = e.target.checked; setTeam(n); }} className="w-4 h-4 accent-indigo-600" />
                                                확정만 보기
                                            </label>
                                            <button onClick={() => setTeam(team.filter((_, idx) => idx !== i))} className="text-red-400 ml-2"><Trash2 className="w-4 h-4"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setTeam([...team, { key: `member_${Date.now()}`, label: "새 팀원", isConfirmedOnly: false }])} className="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-xs text-gray-400 font-black">+ 팀원 추가</button>
                                </div>
                            </section>
                            <section className="font-black">
                                <label className="text-xs font-black text-gray-400 uppercase mb-4 block border-b pb-1">프로젝트 관리</label>
                                <div className="space-y-2">
                                    {projs.map((p, i) => (
                                        <div key={i} className="flex items-center gap-2">
                                            <input value={p} onChange={(e) => { const n = [...projs]; n[i] = e.target.value; setProjs(n); }} className="flex-1 border rounded-lg p-2 text-sm font-black" />
                                            <button onClick={() => setProjs(projs.filter((_, idx) => idx !== i))} className="text-red-400"><Trash2 className="w-4 h-4"/></button>
                                        </div>
                                    ))}
                                    <button onClick={() => setProjs([...projs, "새 프로젝트"])} className="w-full py-2 border-2 border-dashed border-gray-200 rounded-lg text-xs text-gray-400 font-black">+ 프로젝트 추가</button>
                                </div>
                            </section>
                        </div>
                        <div className="flex gap-4 mt-6 pt-4 border-t">
                            <button onClick={onClose} className="flex-1 bg-gray-100 py-3 rounded-xl font-black">취소</button>
                            <button onClick={handleSave} className="flex-2 grow-[2] bg-indigo-600 text-white py-3 rounded-xl shadow-lg font-black">설정 저장</button>
                        </div>
                    </div>
                </div>
            );
        };

        const CategorySettingsModal = ({ currentGroups, currentFees, currentRatios, onClose, onSave }) => {
            const [groups, setGroups] = useState(JSON.parse(JSON.stringify(currentGroups)));
            const [fees, setFees] = useState({ ...currentFees });
            const [ratios, setRatios] = useState({ ...currentRatios });

            const moveGroup = (index, direction) => {
                if ((direction === 'up' || direction === 'top') && index === 0) return;
                if ((direction === 'down' || direction === 'bottom') && index === groups.length - 1) return;
                
                const newGroups = [...groups];
                const item = newGroups.splice(index, 1)[0];
                
                if (direction === 'up') newGroups.splice(index - 1, 0, item);
                else if (direction === 'down') newGroups.splice(index + 1, 0, item);
                else if (direction === 'top') newGroups.unshift(item);
                else if (direction === 'bottom') newGroups.push(item);
                
                setGroups(newGroups);
            };

            const moveSubCat = (groupIndex, subIndex, direction) => {
                const newGroups = [...groups];
                const subs = newGroups[groupIndex].subs;

                if ((direction === 'up' || direction === 'top') && subIndex === 0) return;
                if ((direction === 'down' || direction === 'bottom') && subIndex === subs.length - 1) return;

                const item = subs.splice(subIndex, 1)[0];
                
                if (direction === 'up') subs.splice(subIndex - 1, 0, item);
                else if (direction === 'down') subs.splice(subIndex + 1, 0, item);
                else if (direction === 'top') subs.unshift(item);
                else if (direction === 'bottom') subs.push(item);
                
                setGroups(newGroups);
            };

            const updateSubName = (gIdx, sIdx, oldVal, newVal) => {
                const newGroups = [...groups];
                newGroups[gIdx].subs[sIdx] = newVal;
                setGroups(newGroups);
                
                if (oldVal !== newVal) {
                    const newFees = { ...fees };
                    const newRatios = { ...ratios };
                    if (newFees[oldVal] !== undefined) { newFees[newVal] = newFees[oldVal]; delete newFees[oldVal]; }
                    if (newRatios[oldVal] !== undefined) { newRatios[newVal] = newRatios[oldVal]; delete newRatios[oldVal]; }
                    setFees(newFees);
                    setRatios(newRatios);
                }
            };

            const handleSave = (bulk) => onSave(groups, fees, ratios, bulk);

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] p-4 font-bold">
                    <div className="bg-white rounded-2xl w-full max-w-4xl p-6 shadow-xl flex flex-col h-[80vh]">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <h3 className="text-xl font-black uppercase text-indigo-900 flex items-center gap-2 font-black"><FolderTree className="w-6 h-6"/>카테고리 및 원가공식</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><X className="w-6 h-6"/></button>
                        </div>
                        <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-6">
                            {groups.map((g, gIdx) => (
                                <div key={gIdx} className="bg-gray-50 p-4 rounded-xl border">
                                    <div className="flex items-center gap-3 mb-4 font-black">
                                        <div className="flex items-center gap-1 opacity-40 hover:opacity-100 font-bold transition-opacity bg-gray-200/50 p-1 rounded-md">
                                            <button onClick={() => moveGroup(gIdx, 'top')} className="hover:text-indigo-600 p-0.5" title="최상단으로"><ChevronsUp className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'up')} className="hover:text-indigo-500 p-0.5" title="위로"><ChevronUp className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'down')} className="hover:text-indigo-500 p-0.5" title="아래로"><ChevronDown className="w-4 h-4"/></button>
                                            <button onClick={() => moveGroup(gIdx, 'bottom')} className="hover:text-indigo-600 p-0.5" title="최하단으로"><ChevronsDown className="w-4 h-4"/></button>
                                        </div>
                                        <Layers className="w-5 h-5 text-indigo-600 flex-shrink-0 ml-1" />
                                        <input value={g.main} onChange={(e) => { const n = [...groups]; n[gIdx].main = e.target.value; setGroups(n); }} className="bg-transparent font-black text-indigo-900 text-lg outline-none flex-1 border-b border-transparent focus:border-indigo-200" placeholder="대분류명" />
                                        <button onClick={() => setGroups(groups.filter((_, i) => i !== gIdx))} className="text-red-300 ml-auto font-black bg-white hover:text-red-500 p-1.5 rounded transition-colors"><Trash2 className="w-5 h-5"/></button>
                                    </div>
                                    <div className="space-y-2 pl-8">
                                        {g.subs.map((sub, sIdx) => (
                                            <div key={sIdx} className="flex items-center gap-4 bg-white p-2 rounded border text-xs font-black group shadow-sm hover:border-indigo-200 transition-colors">
                                                <div className="flex items-center gap-1 opacity-30 group-hover:opacity-100 font-bold transition-opacity bg-gray-100 p-1 rounded-md">
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'top')} className="hover:text-indigo-600 p-0.5" title="최상단으로"><ChevronsUp className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'up')} className="hover:text-indigo-500 p-0.5" title="위로"><ChevronUp className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'down')} className="hover:text-indigo-500 p-0.5" title="아래로"><ChevronDown className="w-3 h-3"/></button>
                                                    <button onClick={() => moveSubCat(gIdx, sIdx, 'bottom')} className="hover:text-indigo-600 p-0.5" title="최하단으로"><ChevronsDown className="w-3 h-3"/></button>
                                                </div>
                                                <input value={sub} onChange={(e) => updateSubName(gIdx, sIdx, sub, e.target.value)} className="w-32 border border-gray-200 focus:border-indigo-400 rounded p-1.5 font-black outline-none ml-1" placeholder="소분류명" />
                                                <div className="flex items-center gap-1 font-black">
                                                    <span className="text-gray-500 text-[10px]">배율:</span>
                                                    <input type="number" step="0.01" value={ratios[sub] || 1} onChange={(e) => setRatios({...ratios, [sub]: Number(e.target.value)})} className="w-16 border border-gray-200 rounded px-1.5 py-1 font-black outline-none focus:border-amber-400 text-amber-700"/>
                                                </div>
                                                <div className="flex items-center gap-1 font-black">
                                                    <span className="text-gray-500 text-[10px]">고정비:</span>
                                                    <input type="number" value={fees[sub] || 0} onChange={(e) => setFees({...fees, [sub]: Number(e.target.value)})} className="w-24 border border-gray-200 rounded px-1.5 py-1 font-black outline-none focus:border-indigo-400 text-indigo-700"/>
                                                </div>
                                                <div className="flex-1"></div>
                                                <button onClick={() => { const n = [...groups]; n[gIdx].subs.splice(sIdx, 1); setGroups(n); }} className="text-gray-300 font-black hover:text-red-500 transition-colors"><X className="w-4 h-4"/></button>
                                            </div>
                                        ))}
                                        <button onClick={() => { const n = [...groups]; n[gIdx].subs.push("새 소분류"); setGroups(n); }} className="w-full py-2 border-2 border-dashed border-gray-200 bg-white rounded-xl text-[10px] text-gray-400 font-black hover:border-indigo-400 hover:text-indigo-500 transition-all">+ 소분류 추가</button>
                                    </div>
                                </div>
                            ))}
                            <button onClick={() => setGroups([...groups, { main: "새 대분류", subs: [] }])} className="w-full py-4 border-2 border-dashed border-indigo-200 text-indigo-500 bg-indigo-50/50 rounded-2xl font-black flex items-center justify-center gap-2 hover:bg-indigo-100 transition-all"><Plus className="w-5 h-5"/> 대분류 추가</button>
                        </div>
                        <div className="flex flex-col gap-3 mt-6 pt-4 border-t font-black">
                            <button onClick={() => handleSave(true)} className="w-full bg-amber-500 text-white py-3 rounded-lg text-sm font-black shadow hover:bg-amber-600 transition-colors flex justify-center items-center gap-2">
                                <RefreshCw className="w-4 h-4" /> 현재 수정한 공식을 기존 상품들에 일괄 적용
                            </button>
                            <div className="flex gap-4">
                                <button onClick={onClose} className="flex-1 bg-gray-100 py-3 rounded-xl font-black text-gray-500 hover:bg-gray-200">취소</button>
                                <button onClick={() => handleSave(false)} className="flex-2 grow-[2] bg-indigo-600 text-white py-3 rounded-xl shadow-lg font-black hover:bg-indigo-700">설정만 저장</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App({ firebaseSDK, userRole, userKey }) {
            const { getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, addDoc, updateDoc, deleteDoc, writeBatch, initializeApp, getApps } = firebaseSDK;

            const [user, setUser] = useState(null);
            const [activeMainCategory, setActiveMainCategory] = useState("전체");
            const [activeCategory, setActiveCategory] = useState("전체");
            const [expandedMainCats, setExpandedMainCats] = useState({});
            const [activeProject, setActiveProject] = useState("전체");
            const [searchTerm, setSearchTerm] = useState("");
            const [filterStatus, setFilterStatus] = useState("all"); 
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [isBulkModalOpen, setIsBulkModalOpen] = useState(false);
            const [editingItem, setEditingItem] = useState(null);
            const [isSystemSettingsOpen, setIsSystemSettingsOpen] = useState(false);
            const [isCategorySettingsOpen, setIsCategorySettingsOpen] = useState(false);
            const [isTrashModalOpen, setIsTrashModalOpen] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            const [toast, setToast] = useState(null);

            const [editingNoId, setEditingNoId] = useState(null);
            const [editingNoValue, setEditingNoValue] = useState("");

            const [selectedItems, setSelectedItems] = useState([]);
            const [isBulkMoveModalOpen, setIsBulkMoveModalOpen] = useState(false);
            const [bulkMoveTarget, setBulkMoveTarget] = useState({ project: '', mainCategory: '', category: '' });

            const fileInputRef = useRef(null);

            const [products, setProducts] = useState([]);
            const [settings, setSettings] = useState({ categoryGroups: [], categoryFees: {}, categoryRatios: {}, projects: [], teamMembers: [], exchangeRate: 195 });
            const [security, setSecurity] = useState({ master: DEFAULT_MASTER_PW, memberPasswords: {} });
            
            const [productForm, setProductForm] = useState({ project: '', mainCategory: '', category: '', name: '', option: '', cost: '', price: '', image: null, optionImage: null, cny: '', links: [''], naverLinks: [''] });
            const [lastTargetZone, setLastTargetZone] = useState('main');

            const [sortConfig, setSortConfig] = useState({ key: 'customOrder', direction: 'asc' });

            useEffect(() => {
                setSelectedItems([]);
            }, [activeProject, activeMainCategory, activeCategory, filterStatus]);

            const handleSort = (key) => {
                let direction = 'desc';
                if (sortConfig.key === key && sortConfig.direction === 'desc') {
                    direction = 'asc';
                }
                if (key === 'customOrder') direction = 'asc';
                setSortConfig({ key, direction });
            };

            const { auth, db, appId } = useMemo(() => {
                const firebaseConfig = {
                    apiKey: "AIzaSyBCitvHwUFoRoRqTm-7lL-914T8tmHZYHE",
                    authDomain: "from-to-c.firebaseapp.com",
                    projectId: "from-to-c",
                    storageBucket: "from-to-c.firebasestorage.app",
                    messagingSenderId: "544793341133",
                    appId: "1:544793341133:web:cafc1766980b6322cd4d84"
                };
                let app = !getApps().length ? initializeApp(firebaseConfig) : getApps()[0];
                return { auth: getAuth(app), db: getFirestore(app), appId: typeof __app_id !== 'undefined' ? __app_id : 'sourcing-app-v2' };
            }, []);

            const generateItemCode = () => {
                return 'PRD-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            };

            useEffect(() => {
                const handlePaste = (e) => {
                    if (!isAddModalOpen) return;
                    const items = e.clipboardData.items;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) {
                            const blob = items[i].getAsFile();
                            const reader = new FileReader();
                            reader.onload = (event) => {
                                if (lastTargetZone === 'main') setProductForm(prev => ({ ...prev, image: event.target.result }));
                                else if (lastTargetZone === 'option') setProductForm(prev => ({ ...prev, optionImage: event.target.result }));
                            };
                            reader.readAsDataURL(blob);
                            break;
                        }
                    }
                };
                window.addEventListener('paste', handlePaste);
                return () => window.removeEventListener('paste', handlePaste);
            }, [isAddModalOpen, lastTargetZone]);

            const formatDateTime = (timestamp) => {
                if (!timestamp) return { date: '날짜모름', time: '' };
                const dObj = new Date(timestamp);
                if (isNaN(dObj.getTime())) return { date: '날짜모름', time: '' };
                const y = String(dObj.getFullYear()).slice(-2);
                const m = String(dObj.getMonth() + 1).padStart(2, '0');
                const d = String(dObj.getDate()).padStart(2, '0');
                const hh = String(dObj.getHours()).padStart(2, '0');
                const mm = String(dObj.getMinutes()).padStart(2, '0');
                return { date: `${y}-${m}-${d}`, time: `${hh}:${mm}` };
            };

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                signInAnonymously(auth).then(() => setUser(auth.currentUser));
                const unsubscribe = onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
                return () => unsubscribe();
            }, [auth]);

            useEffect(() => {
                if (!user) return;
                const unsubProds = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'products'), (snapshot) => {
                    setProducts(snapshot.docs.map(doc => ({ ...doc.data(), firebaseId: doc.id })));
                });
                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), (snapshot) => {
                    if (snapshot.exists()) setSettings(snapshot.data());
                });
                const unsubSecurity = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'security'), (snapshot) => {
                    if (snapshot.exists()) setSecurity(snapshot.data());
                });
                return () => { unsubProds(); unsubSettings(); unsubSecurity(); };
            }, [user, db, appId]);

            const currentUserSettings = useMemo(() => settings.teamMembers.find(m => m.key === userKey), [settings.teamMembers, userKey]);
            const isConfirmedOnlyView = userRole === 'member' && currentUserSettings?.isConfirmedOnly;

            const displayProducts = useMemo(() => {
                return products
                    .filter(p => isConfirmedOnlyView ? p.isConfirmed : true)
                    .map(p => ({ 
                        ...p, 
                        mappedMainCategory: p.mainCategory || "미분류",
                        mappedSubCategory: p.category || "미지정"
                    }));
            }, [products, isConfirmedOnlyView]);

            const sidebarGroups = useMemo(() => {
                const groupsMap = new Map();
                settings.categoryGroups.forEach(g => { groupsMap.set(g.main, new Set(g.subs)); });
                displayProducts.forEach(p => {
                    if (p.isDeleted) return;
                    if (activeProject !== "전체" && p.project !== activeProject) return;
                    const main = p.mappedMainCategory;
                    const sub = p.mappedSubCategory;
                    if (!groupsMap.has(main)) groupsMap.set(main, new Set());
                    groupsMap.get(main).add(sub);
                });
                const finalGroups = [];
                settings.categoryGroups.forEach(g => {
                    const officialSubs = g.subs || [];
                    const actualSubs = groupsMap.has(g.main) ? Array.from(groupsMap.get(g.main)) : [];
                    const mergedSubs = Array.from(new Set([...officialSubs, ...actualSubs]));
                    finalGroups.push({ main: g.main, subs: mergedSubs });
                    groupsMap.delete(g.main);
                });
                groupsMap.forEach((subsSet, main) => {
                    finalGroups.push({ main: main, subs: Array.from(subsSet) });
                });
                return finalGroups;
            }, [settings.categoryGroups, displayProducts, activeProject]);

            const filteredProducts = useMemo(() => {
                let list = displayProducts.filter(p => !p.isDeleted);
                if (activeProject !== "전체") list = list.filter(p => p.project === activeProject);
                if (activeMainCategory !== "전체") {
                    list = list.filter(p => p.mappedMainCategory === activeMainCategory);
                    if (activeCategory !== "전체") list = list.filter(p => p.mappedSubCategory === activeCategory);
                }
                if (searchTerm) {
                    const term = searchTerm.toLowerCase();
                    list = list.filter(p => p.name?.toLowerCase().includes(term) || p.option?.toLowerCase().includes(term) || (p.itemCode && p.itemCode.toLowerCase().includes(term)));
                }
                if (filterStatus === 'confirmed') list = list.filter(p => p.isConfirmed);
                else if (filterStatus === 'held') list = list.filter(p => p.isHeld && !p.isConfirmed);
                else if (filterStatus === 'sample') list = list.filter(p => p.isSampleRequested);
                else if (filterStatus === 'unconfirmed') list = list.filter(p => !p.isConfirmed && !p.isHeld);
                
                return list.sort((a, b) => {
                    let aValue, bValue;

                    if (sortConfig.key === 'customOrder') {
                        const priorityA = a.isConfirmed ? 1 : (a.isHeld ? 3 : 2);
                        const priorityB = b.isConfirmed ? 1 : (b.isHeld ? 3 : 2);

                        if (priorityA !== priorityB) {
                            return priorityA - priorityB;
                        }

                        aValue = a.customOrder !== undefined ? a.customOrder : -(a.createdAt || 0);
                        bValue = b.customOrder !== undefined ? b.customOrder : -(b.createdAt || 0);
                        
                        if (aValue === bValue) {
                            return (b.createdAt || 0) - (a.createdAt || 0);
                        }
                    } else if (sortConfig.key === 'margin') {
                        aValue = (a.price || 0) - (a.cost || 0);
                        bValue = (b.price || 0) - (b.cost || 0);
                    } else if (sortConfig.key === 'createdAt') {
                        aValue = a.createdAt || a.id || 0;
                        bValue = b.createdAt || b.id || 0;
                    } else if (sortConfig.key === 'updatedAt') {
                        aValue = a.updatedAt || a.createdAt || a.id || 0;
                        bValue = b.updatedAt || b.createdAt || b.id || 0;
                    } else {
                        aValue = a[sortConfig.key] || 0;
                        bValue = b[sortConfig.key] || 0;
                    }

                    if (aValue < bValue) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aValue > bValue) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [displayProducts, activeProject, activeMainCategory, activeCategory, searchTerm, filterStatus, sortConfig]);

            const startEditingNo = (item, currentNo) => {
                if (sortConfig.key !== 'customOrder' || sortConfig.direction !== 'asc') {
                    showToast("오른쪽 위의 정렬 기준을 '내 임의 정렬 (수동)'으로 설정해야 순서를 바꿀 수 있습니다.", "error");
                    return;
                }
                setEditingNoId(item.firebaseId);
                setEditingNoValue(currentNo.toString());
            };

            const submitNewNo = async (item, currentIdx) => {
                setEditingNoId(null);
                const desiredNo = parseInt(editingNoValue, 10);
                if (isNaN(desiredNo) || desiredNo <= 0) return;

                const targetIdx = desiredNo - 1;
                const maxIdx = filteredProducts.length - 1;
                const clampedTargetIdx = Math.max(0, Math.min(targetIdx, maxIdx));

                if (currentIdx === clampedTargetIdx) return;

                const tempArray = filteredProducts.filter((_, idx) => idx !== currentIdx);

                let newOrder;
                if (clampedTargetIdx === 0) {
                    const firstOrder = tempArray[0].customOrder !== undefined ? tempArray[0].customOrder : -(tempArray[0].createdAt || 0);
                    newOrder = firstOrder - 1000;
                } else if (clampedTargetIdx >= tempArray.length) {
                    const lastOrder = tempArray[tempArray.length - 1].customOrder !== undefined ? tempArray[tempArray.length - 1].customOrder : -(tempArray[tempArray.length - 1].createdAt || 0);
                    newOrder = lastOrder + 1000;
                } else {
                    const beforeOrder = tempArray[clampedTargetIdx - 1].customOrder !== undefined ? tempArray[clampedTargetIdx - 1].customOrder : -(tempArray[clampedTargetIdx - 1].createdAt || 0);
                    const afterOrder = tempArray[clampedTargetIdx].customOrder !== undefined ? tempArray[clampedTargetIdx].customOrder : -(tempArray[clampedTargetIdx].createdAt || 0);
                    newOrder = (beforeOrder + afterOrder) / 2;
                }

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { 
                        customOrder: newOrder, 
                        updatedAt: Date.now() 
                    });
                    showToast(`${desiredNo}번 위치로 즉시 이동되었습니다.`);
                } catch(e) {
                    console.error(e);
                    showToast("순서 변경 중 오류가 발생했습니다.", "error");
                }
            };

            const handleMoveOrder = async (idx, direction) => {
                if (sortConfig.key !== 'customOrder' || sortConfig.direction !== 'asc') {
                    showToast("오른쪽 위의 정렬 기준을 '내 임의 정렬 (수동)'으로 설정해야 순서를 바꿀 수 있습니다.", "error");
                    return;
                }

                const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (targetIdx < 0 || targetIdx >= filteredProducts.length) return;

                const currentItem = filteredProducts[idx];
                const targetItem = filteredProducts[targetIdx];
                
                let newOrder;
                if (direction === 'up') {
                    const beforeTarget = filteredProducts[targetIdx - 1];
                    const targetOrder = targetItem.customOrder !== undefined ? targetItem.customOrder : -(targetItem.createdAt || 0);
                    if (beforeTarget) {
                        const beforeOrder = beforeTarget.customOrder !== undefined ? beforeTarget.customOrder : -(beforeTarget.createdAt || 0);
                        newOrder = (beforeOrder + targetOrder) / 2;
                    } else {
                        newOrder = targetOrder - 1000;
                    }
                } else {
                    const afterTarget = filteredProducts[targetIdx + 1];
                    const targetOrder = targetItem.customOrder !== undefined ? targetItem.customOrder : -(targetItem.createdAt || 0);
                    if (afterTarget) {
                        const afterOrder = afterTarget.customOrder !== undefined ? afterTarget.customOrder : -(afterTarget.createdAt || 0);
                        newOrder = (targetOrder + afterOrder) / 2;
                    } else {
                        newOrder = targetOrder + 1000;
                    }
                }

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', currentItem.firebaseId), { 
                        customOrder: newOrder, 
                        updatedAt: Date.now() 
                    });
                } catch(e) {
                    console.error(e);
                    showToast("순서 변경 중 오류가 발생했습니다.", "error");
                }
            };

            const categoryCounts = useMemo(() => {
                const counts = { main: {}, sub: {} };
                displayProducts.forEach(p => {
                    if (p.isDeleted) return;
                    if (activeProject !== "전체" && p.project !== activeProject) return;

                    if (filterStatus === 'confirmed' && !p.isConfirmed) return;
                    if (filterStatus === 'held' && (!p.isHeld || p.isConfirmed)) return;
                    if (filterStatus === 'sample' && !p.isSampleRequested) return;
                    if (filterStatus === 'unconfirmed' && (p.isConfirmed || p.isHeld)) return;

                    const mainCat = p.mappedMainCategory;
                    const subCat = p.mappedSubCategory;

                    counts.main[mainCat] = (counts.main[mainCat] || 0) + 1;
                    const subKey = `${mainCat}-${subCat}`;
                    counts.sub[subKey] = (counts.sub[subKey] || 0) + 1;
                });
                return counts;
            }, [displayProducts, activeProject, filterStatus]);

            const handleAddOrUpdateProduct = async (e) => {
                e.preventDefault();
                const payload = { 
                    ...productForm, 
                    cost: Number(productForm.cost), 
                    price: Number(productForm.price), 
                    updatedAt: Date.now(),
                    links: productForm.links.filter(l => l.trim()),
                    naverLinks: productForm.naverLinks.filter(l => l.trim())
                };
                if (editingItem) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingItem.firebaseId), payload);
                } else {
                    const newItemCode = generateItemCode();
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), { ...payload, itemCode: newItemCode, createdAt: Date.now(), isConfirmed: false, isHeld: false, isSampleRequested: false, isDeleted: false, approvals: {} });
                }
                setIsAddModalOpen(false);
                showToast("저장되었습니다.");
            };

            const handleSelectAll = (e) => {
                if (e.target.checked) {
                    setSelectedItems(filteredProducts.map(p => p.firebaseId));
                } else {
                    setSelectedItems([]);
                }
            };

            const handleSelectItem = (id) => {
                setSelectedItems(prev => {
                    if (prev.includes(id)) {
                        return prev.filter(item => item !== id);
                    } else {
                        return [...prev, id];
                    }
                });
            };

            const handleBulkDelete = async () => {
                if (!confirm(`선택한 ${selectedItems.length}개 상품을 정말 삭제하시겠습니까?`)) return;
                try {
                    const MAX_BATCH_SIZE = 400;
                    let batches = [];
                    let currentBatch = writeBatch(db);
                    let operationCount = 0;

                    for (const id of selectedItems) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', id);
                        currentBatch.update(docRef, { isDeleted: true, updatedAt: Date.now() });
                        operationCount++;
                        
                        if (operationCount >= MAX_BATCH_SIZE) {
                            batches.push(currentBatch);
                            currentBatch = writeBatch(db);
                            operationCount = 0;
                        }
                    }
                    
                    if (operationCount > 0) batches.push(currentBatch);
                    
                    for (const batch of batches) await batch.commit();

                    setSelectedItems([]);
                    showToast(`선택한 ${selectedItems.length}개 항목이 휴지통으로 이동되었습니다.`);
                } catch (e) {
                    console.error(e);
                    showToast("일괄 삭제 중 오류가 발생했습니다.", "error");
                }
            };

            const handleBulkMove = async (e) => {
                e.preventDefault();
                if (!bulkMoveTarget.project || !bulkMoveTarget.mainCategory || !bulkMoveTarget.category) {
                    showToast("모든 항목을 선택해주세요.", "error");
                    return;
                }
                try {
                    const MAX_BATCH_SIZE = 400;
                    let batches = [];
                    let currentBatch = writeBatch(db);
                    let operationCount = 0;

                    for (const id of selectedItems) {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', id);
                        currentBatch.update(docRef, {
                            project: bulkMoveTarget.project,
                            mainCategory: bulkMoveTarget.mainCategory,
                            category: bulkMoveTarget.category,
                            updatedAt: Date.now()
                        });
                        operationCount++;
                        
                        if (operationCount >= MAX_BATCH_SIZE) {
                            batches.push(currentBatch);
                            currentBatch = writeBatch(db);
                            operationCount = 0;
                        }
                    }
                    
                    if (operationCount > 0) batches.push(currentBatch);
                    
                    for (const batch of batches) await batch.commit();

                    setIsBulkMoveModalOpen(false);
                    setSelectedItems([]);
                    showToast(`선택한 ${selectedItems.length}개 항목의 카테고리가 변경되었습니다.`);
                } catch (e) {
                    console.error(e);
                    showToast("일괄 이동 중 오류가 발생했습니다.", "error");
                }
            };

            const handleDownloadTemplate = () => {
                const headers = ["상품코드", "프로젝트", "대분류", "소분류", "상품명", "옵션", "위안가", "도착가", "판매가", "소싱링크", "경쟁사링크"];
                const example = ["", "2026 여름", "기본 분류", "아쿠아슈즈", "예시 상품명", "빨강/L", "10.5", "5000", "15000", "http://1688.com/... | http://taobao.com/...", "http://smartstore/..."];
                const csvContent = "\uFEFF" + headers.join(",") + "\n" + example.join(",");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "대량등록_빈템플릿.csv";
                link.click();
            };

            const handleDownloadAllAsTemplate = () => {
                const headers = ["상품코드", "프로젝트", "대분류", "소분류", "상품명", "옵션", "위안가", "도착가", "판매가", "소싱링크", "경쟁사링크"];
                const rows = displayProducts.filter(p => !p.isDeleted).map(p => {
                    return [
                        p.itemCode || p.firebaseId.slice(-6).toUpperCase(),
                        p.project || "",
                        p.mappedMainCategory || "",
                        p.mappedSubCategory || "",
                        `"${(p.name || "").replace(/"/g, '""')}"`,
                        `"${(p.option || "").replace(/"/g, '""')}"`,
                        p.cny || "",
                        p.cost || 0,
                        p.price || 0,
                        `"${(p.links || []).join(' | ')}"`,
                        `"${(p.naverLinks || []).join(' | ')}"`
                    ].join(",");
                });
                
                const csvContent = "\uFEFF" + [headers.join(","), ...rows].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "전체상품_백업(업로드양식).csv";
                link.click();
            };

            const handleBulkFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                Papa.parse(file, {
                    header: true,
                    skipEmptyLines: 'greedy', 
                    quoteChar: '"',
                    escapeChar: '"',
                    complete: async (results) => {
                        try {
                            const MAX_BATCH_SIZE = 400; 
                            let batches = [];
                            let currentBatch = writeBatch(db);
                            let operationCount = 0;

                            let addCount = 0;
                            let updateCount = 0;
                            const defaultApprovals = settings.teamMembers.reduce((acc, m) => ({...acc, [m.key]: 'pending'}), {});
                            
                            results.data.forEach(row => {
                                const cleanRow = {};
                                Object.keys(row).forEach(k => {
                                    const cleanKey = k.trim().replace(/^\uFEFF/, '');
                                    cleanRow[cleanKey] = row[k];
                                });

                                if (!cleanRow['상품명'] || !cleanRow['상품명'].trim()) return;
                                
                                const existingCode = cleanRow['상품코드'] ? cleanRow['상품코드'].trim() : null;
                                let existingDoc = null;
                                
                                if (existingCode) {
                                    existingDoc = products.find(p => p.itemCode === existingCode || (p.firebaseId && p.firebaseId.slice(-6).toUpperCase() === existingCode));
                                }
                                
                                const payload = {
                                    project: cleanRow['프로젝트'] || '',
                                    mainCategory: cleanRow['대분류'] || '',
                                    category: cleanRow['소분류'] || '',
                                    name: cleanRow['상품명'] ? cleanRow['상품명'].replace(/^"|"$/g, '').trim() : '',
                                    option: cleanRow['옵션'] ? cleanRow['옵션'].replace(/^"|"$/g, '').trim() : '',
                                    cny: Number(cleanRow['위안가']) || 0,
                                    cost: Number(cleanRow['도착가']) || 0,
                                    price: Number(cleanRow['판매가']) || 0,
                                    links: cleanRow['소싱링크'] ? cleanRow['소싱링크'].replace(/^"|"$/g, '').split('|').map(s=>s.trim()).filter(Boolean) : [],
                                    naverLinks: cleanRow['경쟁사링크'] ? cleanRow['경쟁사링크'].replace(/^"|"$/g, '').split('|').map(s=>s.trim()).filter(Boolean) : [],
                                    updatedAt: Date.now()
                                };

                                if (operationCount >= MAX_BATCH_SIZE) {
                                    batches.push(currentBatch);
                                    currentBatch = writeBatch(db);
                                    operationCount = 0;
                                }

                                if (existingDoc) {
                                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', existingDoc.firebaseId);
                                    currentBatch.update(docRef, payload);
                                    updateCount++;
                                } else {
                                    const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'products'));
                                    currentBatch.set(docRef, {
                                        ...payload,
                                        itemCode: existingCode || generateItemCode(),
                                        createdAt: Date.now(),
                                        isConfirmed: false,
                                        isHeld: false,
                                        isSampleRequested: false,
                                        isDeleted: false,
                                        approvals: defaultApprovals
                                    });
                                    addCount++;
                                }
                                operationCount++;
                            });
                            
                            if (operationCount > 0) {
                                batches.push(currentBatch);
                            }

                            if (batches.length > 0) {
                                showToast(`데이터 업로드 중... (총 ${addCount + updateCount}건)`);
                                for (const batch of batches) {
                                    await batch.commit();
                                }
                                showToast(`신규등록 ${addCount}건, 수정 ${updateCount}건 완료되었습니다.`);
                            } else {
                                showToast("등록할 데이터가 없습니다. 양식을 확인해주세요.", "error");
                            }
                        } catch (err) {
                            showToast("업로드 중 오류 발생: " + err.message, "error");
                            console.error(err);
                        } finally {
                            setIsBulkModalOpen(false);
                            if(fileInputRef.current) fileInputRef.current.value = '';
                        }
                    }
                });
            };

            const handleCnyChange = (val) => { 
                const cat = productForm.category;
                const categoryFee = settings.categoryFees[cat] || 0; 
                const categoryRatio = settings.categoryRatios[cat] || 1.0; 
                const cost = val ? Math.round(val * settings.exchangeRate * categoryRatio) + categoryFee : ''; 
                setProductForm(prev => ({ ...prev, cny: val, cost: cost })); 
            };

            const toggleStatus = async (item, memberKey) => {
                const current = item.approvals?.[memberKey] || 'pending';
                const next = current === 'approved' ? 'rejected' : (current === 'rejected' ? 'pending' : 'approved');
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { approvals: { ...item.approvals, [memberKey]: next }, updatedAt: Date.now() });
            };

            const toggleConfirm = async (item) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { isConfirmed: !item.isConfirmed, isHeld: false, updatedAt: Date.now() });
            };

            const toggleHold = async (item) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { isHeld: !item.isHeld, isConfirmed: false, updatedAt: Date.now() });
            };

            const toggleSample = async (item) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { isSampleRequested: !item.isSampleRequested, updatedAt: Date.now() });
                showToast(item.isSampleRequested ? "샘플 신청이 취소되었습니다." : "샘플이 신청되었습니다.");
            };

            const saveSystemSettings = async (newProjects, newTeam, newSecurity) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { projects: newProjects, teamMembers: newTeam });
                if (newSecurity) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'security'), newSecurity);
                setIsSystemSettingsOpen(false);
                showToast("시스템 설정 저장 완료");
            };

            const saveCategorySettings = async (newGroups, newFees, newRatios, bulkApply) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { categoryGroups: newGroups, categoryFees: newFees, categoryRatios: newRatios });
                if (bulkApply) {
                    const batch = writeBatch(db);
                    products.forEach(p => {
                        if (p.cny) {
                            const ratio = newRatios[p.category] || 1;
                            const fee = newFees[p.category] || 0;
                            batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'products', p.firebaseId), { cost: Math.round(p.cny * settings.exchangeRate * ratio) + fee, updatedAt: Date.now() });
                        }
                    });
                    await batch.commit();
                }
                setIsCategorySettingsOpen(false);
                showToast("분류 설정 저장 완료");
            };

            const handleFilterClick = (status) => {
                setFilterStatus(status);
                setActiveMainCategory("전체");
                setActiveCategory("전체");
            };

            return (
                <React.Fragment>
                    <div className="app-main-container flex h-screen bg-gray-50 overflow-hidden text-sm font-bold font-black">
                        <div className={`sidebar-transition bg-white border-r flex flex-col shadow-sm z-20 overflow-hidden ${isSidebarOpen ? 'w-72' : 'w-0'}`}>
                            <div className="p-6 border-b bg-indigo-600 text-white flex-shrink-0 font-black">
                                <h1 className="text-xl font-black flex items-center gap-2 font-black tracking-tighter"><Package className="w-6 h-6" /> 소싱 대시보드</h1>
                                <p className="text-[10px] mt-1 opacity-80 uppercase tracking-widest font-black">{userRole === 'admin' ? 'Master 모드' : '팀원 모드'}</p>
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 custom-scrollbar space-y-6 font-black">
                                <div className="px-3 font-black">
                                    <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block font-black">프로젝트</label>
                                    <select value={activeProject} onChange={(e) => setActiveProject(e.target.value)} className="w-full bg-indigo-50 border border-indigo-100 rounded-lg px-3 py-2 outline-none font-black">
                                        <option value="전체">전체 보기</option>
                                        {settings.projects.map(pj => <option key={pj} value={pj}>{pj}</option>)}
                                    </select>
                                </div>
                                <div className="px-3 space-y-1 font-black">
                                    <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block font-black">필터</label>
                                    <button onClick={() => handleFilterClick('all')} className={`w-full text-left px-3 py-2 rounded-lg flex justify-between items-center font-black ${filterStatus === 'all' ? 'bg-indigo-100 text-indigo-700' : 'hover:bg-gray-100'}`}>
                                        전체<span>{displayProducts.filter(p => !p.isDeleted && (activeProject === "전체" || p.project === activeProject)).length}</span>
                                    </button>
                                    
                                    {!isConfirmedOnlyView && (
                                        <>
                                            <button onClick={() => handleFilterClick('unconfirmed')} className={`w-full text-left px-3 py-2 rounded-lg flex justify-between items-center font-black ${filterStatus === 'unconfirmed' ? 'bg-blue-100 text-blue-700' : 'hover:bg-gray-100'}`}>
                                                진행중<span>{displayProducts.filter(p => !p.isDeleted && !p.isConfirmed && !p.isHeld && (activeProject === "전체" || p.project === activeProject)).length}</span>
                                            </button>
                                            <button onClick={() => handleFilterClick('held')} className={`w-full text-left px-3 py-2 rounded-lg flex justify-between items-center font-black ${filterStatus === 'held' ? 'bg-amber-100 text-amber-700' : 'hover:bg-gray-100'}`}>
                                                보류건<span>{displayProducts.filter(p => !p.isDeleted && p.isHeld && (activeProject === "전체" || p.project === activeProject)).length}</span>
                                            </button>
                                            <button onClick={() => handleFilterClick('sample')} className={`w-full text-left px-3 py-2 rounded-lg flex justify-between items-center font-black ${filterStatus === 'sample' ? 'bg-blue-100 text-blue-700' : 'hover:bg-gray-100'}`}>
                                                샘플신청<span>{displayProducts.filter(p => !p.isDeleted && p.isSampleRequested && (activeProject === "전체" || p.project === activeProject)).length}</span>
                                            </button>
                                        </>
                                    )}

                                    <button onClick={() => handleFilterClick('confirmed')} className={`w-full text-left px-3 py-2 rounded-lg flex justify-between items-center font-black ${filterStatus === 'confirmed' ? 'bg-green-100 text-green-700' : 'hover:bg-gray-100'}`}>
                                        최종확정<span>{displayProducts.filter(p => !p.isDeleted && p.isConfirmed && (activeProject === "전체" || p.project === activeProject)).length}</span>
                                    </button>
                                </div>
                                <div className="px-3 font-black">
                                    <label className="text-[10px] font-black text-gray-400 uppercase mb-2 block font-black">카테고리</label>
                                    {sidebarGroups.map(group => {
                                        const mainCount = categoryCounts.main[group.main] || 0;
                                        if (mainCount === 0 && activeMainCategory !== group.main) return null;

                                        return (
                                            <div key={group.main} className="mb-1">
                                                <button onClick={() => { setActiveMainCategory(group.main); setActiveCategory("전체"); setExpandedMainCats(p => ({...p, [group.main]: !p[group.main]})); }} className={`w-full text-left px-3 py-2 rounded-lg flex items-center justify-between font-black ${activeMainCategory === group.main ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-gray-100'}`}>
                                                    <span className="flex items-center gap-2 font-black truncate">
                                                        <FolderTree className="w-4 h-4 font-black flex-shrink-0" /> 
                                                        <span className="truncate">{group.main}</span>
                                                    </span>
                                                    <div className="flex items-center gap-2 flex-shrink-0">
                                                        <span className="text-xs text-gray-400">{mainCount}</span>
                                                        {expandedMainCats[group.main] ? <ChevronDown className="w-3 h-3"/> : <ChevronRight className="w-3 h-3"/>}
                                                    </div>
                                                </button>
                                                {expandedMainCats[group.main] && (
                                                    <div className="ml-6 mt-1 space-y-1 border-l-2 border-gray-100 font-black">
                                                        {group.subs.map(sub => {
                                                            const subKey = `${group.main}-${sub}`;
                                                            const subCount = categoryCounts.sub[subKey] || 0;
                                                            if (subCount === 0 && activeCategory !== sub) return null;

                                                            return (
                                                                <button key={sub} onClick={() => { setActiveMainCategory(group.main); setActiveCategory(sub); }} className={`w-full text-left px-3 py-1.5 rounded-lg text-xs flex items-center justify-between font-black ${activeCategory === sub ? 'text-indigo-600 font-black' : 'text-gray-500 hover:bg-gray-50'}`}>
                                                                    <span className="truncate">- {sub}</span>
                                                                    <span className="text-[10px] text-gray-400 flex-shrink-0">{subCount}</span>
                                                                </button>
                                                            )
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>

                                <CurrencyCalculatorSidebar exchangeRate={settings.exchangeRate} onRateChange={async (r) => { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { exchangeRate: r }); showToast("환율이 업데이트되었습니다."); }} userRole={userRole} />

                                <div className="px-1 space-y-1 font-black">
                                    <a href="https://drive.google.com/drive/folders/1wVi8o8T-Vas4mRnBfaI9E_8ualBsqmxR?usp=sharing" target="_blank" className="w-full bg-indigo-50 border border-indigo-100 p-2.5 rounded-xl flex items-center gap-2 text-xs text-indigo-700 hover:bg-indigo-100 font-black mb-2 transition-colors">
                                        <FolderTree className="w-4 h-4 font-black"/> 소싱 저장소
                                    </a>
                                    {userRole === 'admin' && (
                                        <button onClick={() => setIsTrashModalOpen(true)} className="w-full bg-red-50 border border-red-100 p-2.5 rounded-xl flex items-center justify-between text-xs text-red-600 hover:bg-red-100 font-black font-bold font-black font-black"><span className="flex items-center gap-2 font-black"><Trash2 className="w-4 h-4 font-black"/> 휴지통</span><span>{displayProducts.filter(p => p.isDeleted && (activeProject === "전체" || p.project === activeProject)).length}</span></button>
                                    )}
                                </div>
                            </div>
                            <div className="p-4 border-t bg-gray-50 flex items-center justify-between text-[10px] font-black font-black">
                                {userRole === 'admin' ? (
                                    <div className="flex gap-2 w-full font-black">
                                        <button onClick={() => setIsCategorySettingsOpen(true)} className="flex-1 bg-white border py-2 rounded-lg text-indigo-600 shadow-sm font-black">분류설정</button>
