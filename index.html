                                        <button onClick={() => setIsSystemSettingsOpen(true)} className="flex-1 bg-white border py-2 rounded-lg text-gray-500 shadow-sm font-black">시스템</button>
                                    </div>
                                ) : <span className="text-gray-400 font-black">팀원 모드</span>}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col overflow-hidden min-w-0 font-bold font-black">
                            <header className="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm flex-shrink-0">
                                <div className="flex items-center gap-4">
                                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 hover:bg-gray-100 rounded-lg"><Menu className="w-5 h-5 font-black" /></button>
                                    <h2 className="text-lg font-black flex items-center gap-2 uppercase font-black">
                                        {activeProject} <ChevronRight className="w-4 h-4 text-gray-300 font-black" /> {activeMainCategory === "전체" ? "전체 목록" : activeMainCategory}
                                        {activeCategory !== "전체" && <><ChevronRight className="w-3 h-3 text-gray-300 font-black" /> {activeCategory}</>}
                                    </h2>
                                </div>
                                <div className="flex items-center gap-3 font-black">
                                    <div className="flex items-center gap-2 bg-gray-50 px-3 py-2 rounded-lg border border-gray-200 hover:bg-gray-100 transition-colors cursor-pointer mr-2 shadow-sm">
                                        <ArrowUpDown className="w-4 h-4 text-gray-500 font-black" />
                                        <select 
                                            value={`${sortConfig.key}-${sortConfig.direction}`}
                                            onChange={(e) => {
                                                const [key, direction] = e.target.value.split('-');
                                                setSortConfig({ key, direction });

                                    <div className="space-y-4 text-sm text-gray-600 font-bold">
                                        <p className="bg-indigo-50 text-indigo-800 p-4 rounded-xl border border-indigo-100 font-black">
                                            엑셀(CSV) 파일을 이용해 상품을 일괄 등록하거나 수정할 수 있습니다.<br/><br/>
                                            <b>전체 상품 백업(CSV)</b>를 다운로드하여 <b>'상품코드'</b>를 유지한 채 수정 후 업로드하면 기존 내용이 덮어씌워지며, 코드가 없으면 새 상품으로 등록됩니다.
                                        </p>
                                        <div className="flex gap-2">
                                            <button onClick={handleDownloadTemplate} className="flex-1 bg-white border-2 border-indigo-200 text-indigo-600 hover:bg-indigo-50 py-3 rounded-xl font-black font-black transition-colors flex justify-center items-center gap-2">
                                                <Download className="w-4 h-4" /> 빈 템플릿 다운로드
                                            </button>
                                            <button onClick={handleDownloadAllAsTemplate} className="flex-1 bg-white border-2 border-green-200 text-green-600 hover:bg-green-50 py-3 rounded-xl font-black transition-colors flex justify-center items-center gap-2">
                                                <Download className="w-4 h-4" /> 전체 상품 백업 (CSV)
                                            </button>
                                        </div>
                                        <input type="file" accept=".csv" ref={fileInputRef} onChange={handleBulkFileChange} style={{display: 'none'}} />
                                        <button onClick={() => fileInputRef.current.click()} className="w-full bg-indigo-600 text-white py-3 rounded-xl shadow-lg hover:bg-indigo-700 font-black font-black transition-transform active:scale-95 flex justify-center items-center gap-2">
                                            <Upload className="w-4 h-4" /> 수정한 CSV 업로드하기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {isAddModalOpen && (
                            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4 font-black font-black font-black">
                                <div className="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl overflow-y-auto max-h-[95vh] custom-scrollbar font-black font-black">
                                    <h3 className="text-xl font-black mb-6 text-indigo-900 font-black font-black">{editingItem ? '상품 정보 수정' : '신규 상품 등록'}</h3>
                                    <form onSubmit={handleAddOrUpdateProduct} className="space-y-6 font-black font-black font-black">
                                        <div className="grid grid-cols-2 gap-4 font-black font-black">
                                            <div className={`h-40 bg-gray-50 border-2 border-dashed rounded-xl flex flex-col items-center justify-center relative overflow-hidden transition-all cursor-pointer font-black font-black ${lastTargetZone === 'main' ? 'border-indigo-500 bg-indigo-50 shadow-inner font-black' : 'border-gray-200'}`} onClick={() => setLastTargetZone('main')}>
                                                {productForm.image ? <img src={productForm.image} className="w-full h-full object-contain p-2 font-black" /> : <div className="text-center font-black font-black"><ImageIcon className="mx-auto w-6 h-6 text-gray-400 mb-1 font-black"/><div className="text-[10px] text-gray-400 font-black">대표 이미지 (Ctrl+V)</div></div>}
                                            </div>
                                            <div className={`h-40 bg-gray-50 border-2 border-dashed rounded-xl flex flex-col items-center justify-center relative overflow-hidden transition-all cursor-pointer font-black font-black ${lastTargetZone === 'option' ? 'border-amber-500 bg-amber-50 shadow-inner font-black' : 'border-gray-200'}`} onClick={() => setLastTargetZone('option')}>
                                                {productForm.optionImage ? <img src={productForm.optionImage} className="w-full h-full object-contain p-2 font-black" /> : <div className="text-center font-black font-black"><ImageIcon className="mx-auto w-6 h-6 text-gray-400 mb-1 font-black"/><div className="text-[10px] text-gray-400 font-black">옵션 이미지 (Ctrl+V)</div></div>}
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 font-black font-black">
                                            <div className="space-y-1 font-black font-black font-black">
                                                <label className="text-[10px] text-gray-400 uppercase font-black font-black font-black">프로젝트</label>
                                                <select value={productForm.project} onChange={(e) => setProductForm({...productForm, project: e.target.value})} className="w-full border rounded-lg p-2.5 bg-gray-50 outline-none font-black font-black font-black" required>
                                                    {settings.projects.map(pj => <option key={pj} value={pj}>{pj}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1 font-black font-black">
                                                <label className="text-[10px] text-gray-400 uppercase font-black font-black">대분류</label>
                                                <select value={productForm.mainCategory} onChange={(e) => setProductForm({...productForm, mainCategory: e.target.value, category: ''})} className="w-full border rounded-lg p-2.5 bg-gray-50 outline-none font-black font-black font-black" required>
                                                    <option value="">선택</option>
                                                    {settings.categoryGroups.map(g => <option key={g.main} value={g.main}>{g.main}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1 font-black font-black">
                                            <label className="text-[10px] text-gray-400 uppercase font-black font-black font-black">상세 소분류</label>
                                            <select value={productForm.category} onChange={(e) => setProductForm({...productForm, category: e.target.value})} className="w-full border rounded-lg p-2.5 bg-gray-50 outline-none font-black font-black font-black" required>
                                                <option value="">선택</option>
                                                {settings.categoryGroups.find(g => g.main === productForm.mainCategory)?.subs.map(sub => <option key={sub} value={sub}>{sub}</option>)}
                                            </select>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4 font-black font-black">
                                            <div className="space-y-1 font-black font-black font-black"><label className="text-[10px] text-gray-400 uppercase font-black font-black font-black">상품명</label><input type="text" value={productForm.name} onChange={(e) => setProductForm({...productForm, name: e.target.value})} className="w-full border rounded-lg p-2.5 outline-none font-black font-black font-black" required /></div>
                                            <div className="space-y-1 font-black font-black font-black"><label className="text-[10px] text-gray-400 uppercase font-black font-black font-black">옵션 정보</label><input type="text" value={productForm.option} onChange={(e) => setProductForm({...productForm, option: e.target.value})} className="w-full border rounded-lg p-2.5 outline-none font-black font-black font-black" placeholder="예: 빨강/L" /></div>
                                        </div>

                                        <div className="bg-indigo-50 p-4 rounded-xl border border-indigo-100 font-black font-black">
                                            <div className="flex justify-between mb-3 font-black font-black"><label className="text-xs text-indigo-700 font-black font-black">자동 원가 계산 공식</label><span className="text-[10px] text-indigo-400 font-black font-black">배율: {settings.categoryRatios[productForm.category] || 1}배 | 고정비: {settings.categoryFees[productForm.category] || 0}원</span></div>
                                            <div className="flex gap-4 items-end font-black font-black">
                                                <div className="flex-1 font-black font-black"><label className="text-[10px] text-gray-500 font-black font-black">위안가 (CNY)</label><input type="number" step="any" value={productForm.cny} onChange={(e) => handleCnyChange(e.target.value)} className="w-full border rounded-lg p-2.5 outline-none font-mono font-black font-black" placeholder="0.00"/></div>
                                                <div className="pb-3 text-indigo-300 font-black font-black font-black font-black font-black">→</div>
                                                <div className="flex-1 font-black font-black font-black"><label className="text-[10px] text-gray-500 font-black font-black font-black">계산된 원가</label><div className="w-full bg-white border border-indigo-200 rounded-lg p-2.5 text-indigo-700 font-mono font-black font-black">{(productForm.cost || 0).toLocaleString()}원</div></div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 font-black font-black">
                                            <div className="space-y-1 font-black font-black font-black"><label className="text-[10px] text-gray-400 font-black font-black font-black">도착 원가 확정</label><input type="number" value={productForm.cost} onChange={(e) => setProductForm({...productForm, cost: e.target.value})} className="w-full border rounded-lg p-2.5 font-mono font-black font-black font-black" required /></div>
                                            <div className="space-y-1 font-black font-black font-black"><label className="text-[10px] text-gray-400 font-black font-black font-black font-black">국내 판매가</label><input type="number" value={productForm.price} onChange={(e) => setProductForm({...productForm, price: e.target.value})} className="w-full border rounded-lg p-2.5 font-mono font-black font-black font-black font-black font-black" required /></div>
                                        </div>

                                        <div className="space-y-4 font-black font-black">
                                            <div className="space-y-2 font-black font-black font-black font-black">
                                                <div className="flex justify-between font-black font-black font-black"><label className="text-[10px] text-orange-600 font-black font-black font-black uppercase font-black">소싱처 링크</label><button type="button" onClick={() => setProductForm({...productForm, links: [...productForm.links, '']})} className="text-[9px] text-orange-500 font-black font-black font-black font-black">+ 추가</button></div>
                                                {productForm.links.map((l, i) => <input key={i} value={l} onChange={(e) => { const nl = [...productForm.links]; nl[i] = e.target.value; setProductForm({...productForm, links: nl})}} className="w-full border rounded-lg p-2 text-[10px] outline-none font-black font-black font-black font-black" placeholder="URL 입력"/>)}
                                            </div>
                                            <div className="space-y-2 font-black font-black">
                                                <div className="flex justify-between font-black font-black font-black font-black"><label className="text-[10px] text-green-600 font-black font-black font-black uppercase font-black">경쟁사 링크</label><button type="button" onClick={() => setProductForm({...productForm, naverLinks: [...productForm.naverLinks, '']})} className="text-[9px] text-green-500 font-black font-black font-black font-black font-black font-black">+ 추가</button></div>
                                                {productForm.naverLinks.map((l, i) => <input key={i} value={l} onChange={(e) => { const nl = [...productForm.naverLinks]; nl[i] = e.target.value; setProductForm({...productForm, naverLinks: nl})}} className="w-full border rounded-lg p-2 text-[10px] outline-none font-black font-black font-black font-black" placeholder="URL 입력"/>)}
                                            </div>
                                        </div>

                                        <div className="flex gap-4 mt-6 font-black font-black font-black font-black">
                                            <button type="button" onClick={() => setIsAddModalOpen(false)} className="flex-1 bg-gray-100 py-3 rounded-xl font-black font-black font-black font-black font-black">취소</button>
                                            <button type="submit" className="flex-1 bg-indigo-600 text-white py-3 rounded-xl shadow-lg font-black font-black font-black font-black font-black font-black">저장 완료</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {isSystemSettingsOpen && <SystemSettingsModal currentProjects={settings.projects} currentTeam={settings.teamMembers} currentSecurity={security} onClose={() => setIsSystemSettingsOpen(false)} onSave={saveSystemSettings} />}
                        {isCategorySettingsOpen && <CategorySettingsModal currentGroups={settings.categoryGroups} currentFees={settings.categoryFees} currentRatios={settings.categoryRatios} onClose={() => setIsCategorySettingsOpen(false)} onSave={saveCategorySettings} />}
                        
                        {isTrashModalOpen && (
                            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[200] p-4 font-black">
                                <div className="bg-white rounded-2xl w-full max-w-3xl p-6 shadow-2xl flex flex-col h-[80vh]">
                                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                                        <h3 className="text-xl font-black text-red-600 flex items-center gap-2"><Trash2 className="w-6 h-6"/> 휴지통</h3>
                                        <button onClick={() => setIsTrashModalOpen(false)} className="text-gray-400 hover:text-gray-600"><X className="w-6 h-6"/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar space-y-3">
                                        {displayProducts.filter(p => p.isDeleted).length === 0 ? (
                                            <div className="text-center text-gray-400 py-10 font-black">휴지통이 비어있습니다.</div>
                                        ) : (
                                            displayProducts.filter(p => p.isDeleted).map(item => (
                                                <div key={item.firebaseId} className="flex items-center justify-between p-3 border rounded-xl bg-gray-50 hover:border-red-200 transition-colors">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-12 h-12 bg-white rounded-lg border flex items-center justify-center overflow-hidden shadow-sm">
                                                            {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <ImageIcon className="w-5 h-5 text-gray-300" />}
                                                        </div>
                                                        <div>
                                                            <div className="text-sm font-black text-gray-800">{item.name} <span className="text-xs text-gray-400 font-bold">({item.option || '옵션없음'})</span></div>
                                                            <div className="text-[10px] text-gray-400 font-mono mt-0.5">#{item.itemCode || item.firebaseId.slice(-6).toUpperCase()}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <button onClick={async () => {
                                                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId), { isDeleted: false, updatedAt: Date.now() });
                                                            showToast("항목이 복구되었습니다.");
                                                        }} className="px-3 py-2 bg-white border border-green-200 text-green-600 rounded-lg text-xs hover:bg-green-50 transition-colors flex items-center gap-1 shadow-sm"><RotateCcw className="w-3.5 h-3.5"/> 복구</button>
                                                        <button onClick={async () => {
                                                            if(confirm("이 항목을 영구적으로 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.")) {
                                                                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.firebaseId));
                                                                showToast("영구 삭제되었습니다.");
                                                            }
                                                        }} className="px-3 py-2 bg-white border border-red-200 text-red-600 rounded-lg text-xs hover:bg-red-50 transition-colors flex items-center gap-1 shadow-sm"><Trash2 className="w-3.5 h-3.5"/> 영구삭제</button>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {toast && (
                            <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[300] px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 bg-indigo-900 text-white toast-slide-in font-black font-black">
                                <CheckCircle className="w-5 h-5 text-indigo-300 font-black font-black"/>
                                <span className="font-black text-sm font-black font-black font-black">{toast.message}</span>
                            </div>
                        )}
                        {previewImage && (
                            <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-[300] font-black font-black" onClick={() => setPreviewImage(null)}>
                                <img src={previewImage} className="max-w-[95%] max-h-[95%] object-contain shadow-2xl font-black font-black rounded" />
                            </div>
                        )}
                    </div>
                </React.Fragment>
            );
        }

        function Launcher() {
            const [isReady, setIsReady] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [userRole, setUserRole] = useState(null); 
            const [userKey, setUserKey] = useState(null);

            useEffect(() => {
                const sessionRole = sessionStorage.getItem('team_role');
                const sessionKey = sessionStorage.getItem('team_user_key');
                if (sessionRole) { setUserRole(sessionRole); setUserKey(sessionKey); setIsLoggedIn(true); }
                if (window.FirebaseSDK) setIsReady(true);
                else window.addEventListener('firebase-ready', () => setIsReady(true));
            }, []);

            if (!isReady) return <div className="loading-container font-black font-black font-black"><div className="spinner font-black font-black"></div><div className="mt-4 text-gray-400 text-xs font-black font-black font-black">대시보드 로딩 중...</div></div>;
            
            if (!isLoggedIn) return (
                <LoginScreen 
                    onLogin={(role, key) => { 
                        sessionStorage.setItem('team_role', role); 
                        if(key) sessionStorage.setItem('team_user_key', key); 
                        setUserRole(role); 
                        setUserKey(key); 
                        setIsLoggedIn(true); 
                    }} 
                    firebaseSDK={window.FirebaseSDK} 
                />
            );

            return (
                <ErrorBoundary>
                    <App firebaseSDK={window.FirebaseSDK} userRole={userRole} userKey={userKey} />
                </ErrorBoundary>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Launcher />);
    </script>
</body>
</html>
